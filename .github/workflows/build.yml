name: QEMU Gunyah 构建
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
env:
  apiLevel: 36
  ndkPath: "$HOME/android-ndk-r30-beta1"
  toolchain: "$HOME/android-ndk-r30-beta1/toolchains/llvm/prebuilt/linux-x86_64"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 部署
      run: |
        sudo apt update
        sudo apt install --no-install-recommends -y build-essential device-tree-compiler ninja-build pkg-config unzip wget xz-utils
        sudo pip3 install --upgrade meson
        wget https://dl.google.com/android/repository/android-ndk-r30-beta1-linux.zip -O ndk.zip
        unzip -q ndk.zip -d $HOME
        wget https://raw.githubusercontent.com/AnyLaySys/qemu-gunyah-build/main/1.sh
        chmod +x ./1.sh
        ./1.sh
    - name: 拉取
      run: |
        git clone --depth 1 --single-branch --no-tags --filter=blob:none --recurse-submodules --shallow-submodules --also-filter-submodules --jobs $(nproc) https://github.com/AnyLaySys/qemu-gunyah.git build/src/qemu-gzvm-main
        mkdir -p build/src/qemu-gzvm-main/pyvenv
        wget https://raw.githubusercontent.com/qemu/qemu/master/pyvenv/meson.build -O build/src/qemu-gzvm-main/pyvenv/meson.build
        mkdir -p build/src/qemu-gzvm-main/subprojects/packagefiles/berkeley-softfloat-3 build/src/qemu-gzvm-main/subprojects/packagefiles/berkeley-testfloat-3
        wget https://raw.githubusercontent.com/qemu/qemu/master/subprojects/packagefiles/berkeley-softfloat-3/meson.build -O build/src/qemu-gzvm-main/subprojects/packagefiles/berkeley-softfloat-3/meson.build
        wget https://raw.githubusercontent.com/qemu/qemu/master/subprojects/packagefiles/berkeley-softfloat-3/meson_options.txt -O build/src/qemu-gzvm-main/subprojects/packagefiles/berkeley-softfloat-3/meson_options.txt
        wget https://raw.githubusercontent.com/qemu/qemu/master/subprojects/packagefiles/berkeley-testfloat-3/meson.build -O build/src/qemu-gzvm-main/subprojects/packagefiles/berkeley-testfloat-3/meson.build
        wget https://raw.githubusercontent.com/qemu/qemu/master/subprojects/packagefiles/berkeley-testfloat-3/meson_options.txt -O build/src/qemu-gzvm-main/subprojects/packagefiles/berkeley-testfloat-3/meson_options.txt
    - name: 编译
      run: |
        set -e
        srcDir="$GITHUB_WORKSPACE/build/src/qemu-gzvm-main"
        sysrootDir="$GITHUB_WORKSPACE/build/sysroot"
        toolchain="$HOME/android-ndk-r30-beta1/toolchains/llvm/prebuilt/linux-x86_64"
        cd "$srcDir"
        export CC="$toolchain/bin/aarch64-linux-android$apiLevel-clang"
        export CXX="$toolchain/bin/aarch64-linux-android$apiLevel-clang++"
        env PATH="$toolchain/bin:$sysrootDir/bin:$PATH" PKG_CONFIG=/usr/bin/pkg-config PKG_CONFIG_LIBDIR="$sysrootDir/lib/pkgconfig" PKG_CONFIG_PATH="$sysrootDir/lib/pkgconfig" LDFLAGS="-L$sysrootDir/lib -Wl,-rpath-link,$sysrootDir/lib" AR="$toolchain/bin/llvm-ar" NM="$toolchain/bin/llvm-nm" OBJCOPY="$toolchain/bin/llvm-objcopy" RANLIB="$toolchain/bin/llvm-ranlib" STRIP="$toolchain/bin/llvm-strip" ./configure --cpu=aarch64 --cross-prefix=aarch64-linux-android- --target-list=aarch64-softmmu --enable-tcg --with-coroutine=sigaltstack --extra-cflags="-I$sysrootDir/include -I$srcDir/linux-headers" --disable-dbus-display --disable-docs --disable-gio --disable-hvf --disable-multiprocess --disable-opengl --disable-tools --disable-guest-agent --disable-usb-redir --disable-virtfs --disable-vduse-blk-export --disable-libvduse --disable-vhost-crypto --disable-vhost-kernel --disable-vhost-net --disable-vhost-user --disable-vhost-user-blk-server --disable-vhost-vdpa --disable-virglrenderer --disable-werror --disable-tpm --disable-install-blobs
        ninja -C build -j$(nproc) qemu-system-aarch64
    - name: 打包
      run: |
        set -e
        srcDir="$GITHUB_WORKSPACE/build/src/qemu-gzvm-main"
        sysrootDir="$GITHUB_WORKSPACE/build/sysroot"
        qvmDir="$GITHUB_WORKSPACE/qemu-gzvm"
        toolchain="$HOME/android-ndk-r30-beta1/toolchains/llvm/prebuilt/linux-x86_64"
        mkdir -p "$qvmDir"
        cp -L -t "$qvmDir" "$srcDir/build/qemu-system-aarch64" "$sysrootDir/lib/libpixman-1.so" "$sysrootDir/lib/libusb-1.0.so" "$sysrootDir/lib/libglib-2.0.so.0" "$sysrootDir/lib/libgmodule-2.0.so.0" "$sysrootDir/lib/libintl.so.8" "$sysrootDir/lib/libpcre2-8.so" "$toolchain/sysroot/usr/lib/aarch64-linux-android/$apiLevel/libz.so"
        install -D "$srcDir/pc-bios/keymaps/en-us" "$qvmDir/pc-bios/keymaps/en-us"
        install -D "$srcDir/pc-bios/efi-virtio.rom" "$qvmDir/pc-bios/efi-virtio.rom"
        "$toolchain/bin/llvm-strip" --strip-all "$qvmDir/qemu-system-aarch64" "$qvmDir"/*.so
        tar --numeric-owner -c qemu-gzvm | xz > qemu-gzvm.xz
    - name: 上传
      uses: actions/upload-artifact@v7
      with:
        name: qemu-gzvm
        path: qemu-gzvm.xz
        archive: false
        if-no-files-found: error
